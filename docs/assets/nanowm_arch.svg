<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="NanoWM architecture">
<defs>
<linearGradient id="bl" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eaf2fc"/><stop offset="1" stop-color="#d3e4fa"/></linearGradient>
<linearGradient id="am" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fef1da"/><stop offset="1" stop-color="#fde0b6"/></linearGradient>
