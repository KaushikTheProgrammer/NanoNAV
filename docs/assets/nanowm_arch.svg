<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="NanoWM architecture">
<defs>
