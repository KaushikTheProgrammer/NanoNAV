<style>.wire{stroke:#9aa3b2;stroke-width:1.8;stroke-linecap:round;stroke-dasharray:1 7;animation:flow 1.1s linear infinite;}@keyframes flow{to{stroke-dashoffset:-16;}}.glow{animation:glow 2.8s ease-in-out infinite;}@keyframes glow{0%,100%{opacity:.18}50%{opacity:.6}}.dot{filter:drop-shadow(0 0 2px rgba(0,0,0,.15));}.lbl{fill:#1a1f2b;font-size:13px;}.sub{fill:#6b7280;font-size:11px;font-style:italic;}</style>
